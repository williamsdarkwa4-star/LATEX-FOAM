        * {

        body {

            min-height: 100vh;

        /* Top Header Component */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #020708;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 900;
            color: #e5c158;
            font-style: italic;
        }

        .user-meta .phone-num {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        .user-meta .status-tag {
            font-size: 12px;
            color: #00bcd4;
        }

        .top-icons {
            display: flex;
            gap: 15px;
            color: #8fa0a3;
            font-size: 18px;
        }

        /* Balance Sphere Container */
        .balance-container {
            flex: 1;
            display: flex;
            flex-direction: center;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 20px;
            background: radial-gradient(circle at center, #072a2e 0%, #000000 70%);
        }

        .sphere-card {
            text-align: center;
        }

        .main-graphic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #00bcd4;
            background: radial-gradient(circle, rgba(0,188,212,0.2) 0%, rgba(0,0,0,0) 75%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.3);
        }

        .graphic-icon {
            font-size: 50px;
            font-weight: bold;
            color: #e5c158;
            font-style: italic;
        }

        .balance-display {
            font-size: 26px;
            font-weight: bold;
            color: #00bcd4;
            letter-spacing: 1px;
        }

        /* Action Menu Panel */
        .action-panel {
            background-color: #050b0c;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px 20px;
            border-top: 1px solid #0d2226;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 10px;
            text-align: center;
        }

        .grid-item {
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background-color: #0a191c;
            border: 1px solid #14353a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #00bcd4;
            transition: all 0.3s ease;
        }

        .grid-item:hover .icon-box {
            background-color: #00bcd4;
            color: #000000;
        }

        .grid-label {
            font-size: 12px;
            color: #9cb1b4;
            white-space: nowrap;
        }

        /* Bottom Fixed Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #030a0b;
            border-top: 1px solid #0c2024;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #657e81;
        }

        .nav-link.active {
            color: #00bcd4;
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-text {
            font-size: 11px;
        }
    </style>
</head>

         <!-- Logic Controller Scripts -->
    <script>
        function copyReferralLink() {
            const linkBox = document.getElementById("linkBox");
            const linkText = linkBox.innerText.trim();
            const copyBtn = document.querySelector(".action-btn");
            
            if (linkText === "Loading link..." || linkText === "") {
                alert("Your invitation link is still loading. Please wait.");
                return;
            }

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(linkText)
                    .then(() => handleCopySuccess(copyBtn))
                    .catch(err => handleCopyError(linkBox));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = linkText;
                textArea.style.position = "fixed"; 
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    handleCopySuccess(copyBtn);
                } catch (err) {
                    handleCopyError(linkBox);
                }
                document.body.removeChild(textArea);
            }
        }

        function handleCopySuccess(button) {
            const originalText = button.innerText;
            button.innerText = "✓ COPIED!";
            button.style.backgroundColor = "#2a9d8f"; 
            
            setTimeout(() => {
                button.innerText = originalText;
                button.style.backgroundColor = "#118ab2"; 
            }, 2000);
        }

        function handleCopyError(container) {
            alert("Failed to copy automatically. Please copy the link text directly.");
            container.style.border = "2px dashed #e63946";
        }

        // Gather server background stats and investment tracking ledgers
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Load team counter metrics
            fetch('/api/team/dashboard-data')
                .then(response => {
                    if (!response.ok) throw new Error('API server unreachable');
                    return response.json();
                })
                .then(data => {
                    document.getElementById("statusMessage").style.display = "none";
                    if(data.total_members !== undefined) document.getElementById("totalMembers").innerText = data.total_members;
                    if(data.lvl1_count !== undefined) document.getElementById("lvl1Count").innerText = data.lvl1_count;
                    if(data.lvl2_count !== undefined) document.getElementById("lvl2Count").innerText = data.lvl2_count;
                    if(data.lvl3_count !== undefined) document.getElementById("lvl3Count").innerText = data.lvl3_count;
                })
                .catch(error => {
                    console.log("Status update failed:", error);
                    document.getElementById("statusMessage").innerText = "Unable to load team data";
                });

            // 2. Load live downline activity ledger rows
            fetch('/api/team/investment-ledger')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('ledgerContainer');
                    container.innerHTML = '';
                    
                    if (!data.ledger || data.ledger.length === 0) {
                        container.innerHTML = '<div style="text-align:center; color:#4a5d78; font-size:13px; padding:10px;">No investment logs recorded in this network branch yet.</div>';
                        return;
                    }

                    data.ledger.forEach(item => {
                        const entry = document.createElement('div');
                        entry.style.cssText = "display: flex; justify-content: space-between; align-items: center; padding: 12px; background-color: #020710; border: 1px solid #0d1e36; border-radius: 8px; margin-bottom: 4px;";
                        entry.innerHTML = `
                            <div style="text-align: left; display: flex; flex-direction: column;">
                                <span style="color: #ffffff; font-size: 14px; font-weight: bold;">User ${item.phone}</span>
                                <span style="color: #4a5d78; font-size: 11px; margin-top: 2px;">Tier Level ${item.level} • ${item.date}</span>
                            </div>
                            <div style="color: #00bcd4; font-size: 15px; font-weight: bold; text-align: right;">
                                GH₵ ${item.amount.toFixed(2)}
                            </div>
                        `;
                        container.appendChild(entry);
                    });
                })
                .catch(() => {
                    document.getElementById('ledgerContainer').innerHTML = '<div style="text-align:center; color:#e63946; font-size:13px;">Failed to process live ledger feeds.</div>';
                });
        });
    </script>
