<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LATEX FOAM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 70px; /* Space for bottom nav */
        }

        /* Top Header Component */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #020708;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 900;
            color: #e5c158;
            font-style: italic;
        }

        .user-meta .phone-num {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        .user-meta .status-tag {
            font-size: 12px;
            color: #00bcd4;
        }

        .top-icons {
            display: flex;
            gap: 15px;
            color: #8fa0a3;
            font-size: 18px;
        }

        /* Balance Sphere Container */
        .balance-container {
            flex: 1;
            display: flex;
            flex-direction: center;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 20px;
            background: radial-gradient(circle at center, #072a2e 0%, #000000 70%);
        }

        .sphere-card {
            text-align: center;
        }

        .main-graphic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #00bcd4;
            background: radial-gradient(circle, rgba(0,188,212,0.2) 0%, rgba(0,0,0,0) 75%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.3);
        }

        .graphic-icon {
            font-size: 50px;
            font-weight: bold;
            color: #e5c158;
            font-style: italic;
        }

        .balance-display {
            font-size: 26px;
            font-weight: bold;
            color: #00bcd4;
            letter-spacing: 1px;
        }

        /* Action Menu Panel */
        .action-panel {
            background-color: #050b0c;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px 20px;
            border-top: 1px solid #0d2226;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 10px;
            text-align: center;
        }

        .grid-item {
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background-color: #0a191c;
            border: 1px solid #14353a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #00bcd4;
            transition: all 0.3s ease;
        }

        .grid-item:hover .icon-box {
            background-color: #00bcd4;
            color: #000000;
        }

        .grid-label {
            font-size: 12px;
            color: #9cb1b4;
            white-space: nowrap;
        }

        /* Bottom Fixed Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #030a0b;
            border-top: 1px solid #0c2024;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #657e81;
        }

        .nav-link.active {
            color: #00bcd4;
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-text {
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- Top Status Header -->
    <div class="top-header">
        <div class="user-info">
            <div class="header-logo">L</div>
            <div class="user-meta">
                <div class="phone-num">{{ user_phone }}</div>
                <div class="status-tag">Home</div>
            </div>
        </div>
        <div class="top-icons">
            <span>💬</span>
            <span>🌐</span>
            <span>🎧</span>
        </div>
    </div>

    <!-- Balance Sphere Graphic Display -->
    <div class="balance-container">
        <div class="sphere-card">
            <div class="main-graphic">
                <div class="graphic-icon">L</div>
            </div>
            <!-- Dynamic balance injected from user profile values -->
            <div class="balance-display">{{ "%.2f"|format(user_balance) }} GHS</div>
        </div>
    </div>

    <!-- Action Shortcuts Grid Dashboard Core -->
    <div class="action-panel">
        <div class="action-grid">
            <a href="{{ url_for('deposit') }}" class="grid-item">
                <div class="icon-box">💵</div>
                <div class="grid-label">Recharge</div>
            </a>
            <a href="{{ url_for('withdraw') }}" class="grid-item">
                <div class="icon-box">📤</div>
                <div class="grid-label">Withdrawal</div>
            </a>
            <a href="#" class="grid-item">
                <div class="icon-box">🔄</div>
                <div class="grid-label">Exchange</div>
            </a>
            
            </a>
            <a href="#" class="grid-item">
                <div class="icon-box">📥</div>
                <div class="grid-label">Download</div>
                <!-- History Page Navigation Anchor Link -->
<a href="{{ url_for('history') }}" class="button" style="background-color: #9b4dca; color: white; margin: 5px; padding: 10px 20px; border-radius: 4px; text-decoration: none; display: inline-block;">
    📊 Transaction History
</a>

            </a>
            <a href="#" class="grid-item">
                <div class="icon-box">👥</div>
                <div class="grid-label">Team</div>
            </a>
            <a href="{{ url_for('service') }}" class="grid-item">
                <div class="icon-box">🏢</div>
                <div class="grid-label">About</div>
            </a>
            <a href="#" class="grid-item">
                <div class="icon-box">✈️</div>
                <div class="grid-label">Support</div>
            </a>
        </div>
    </div>

    <!-- Persistent Lower App Navigation Dock -->
    <nav class="bottom-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-link active">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">Home</div>
        </a>
        <a href="{{ url_for('my_plan') }}" class="nav-link">
            <div class="nav-icon">🔄</div>
            <div class="nav-text">Transaction</div>
        </a>
        <a href="{{ url_for('plan') }}" class="nav-link">
            <div class="nav-icon">🗄️</div>
            <div class="nav-text">Cloud mining</div>
        </a>
        <a href="{{ url_for('login') }}" class="nav-link">
            <a href="{{ url_for('profile') }}" class="nav-link">
    <div class="nav-icon">👤</div>
    <div class="nav-text">Mine</div>
</a>
    </nav>

</body>
</html>
