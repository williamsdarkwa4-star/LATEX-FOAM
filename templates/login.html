<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login - LATEX FOAM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 10px;
        }

        .header {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, #0e3a3e 0%, #05181a 70%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.1);
        }

        .logo-icon {
            font-size: 55px;
            font-weight: 900;
            color: #e5c158;
            text-shadow: 0 0 10px rgba(229, 193, 88, 0.6), 2px 2px 2px #000;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            margin-bottom: 12px;
            color: #ffffff;
            font-weight: 400;
        }

        .form-group input {
            width: 100%;
            background-color: #050f11;
            border: 1px solid #102a30;
            border-radius: 12px;
            padding: 16px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: #00bcd4;
        }

        .form-group input::placeholder {
            color: #3b5256;
        }

        .switch-link {
            font-size: 14px;
            margin-top: 20px;
            margin-bottom: 30px;
            color: #a0a0a0;
        }

        .switch-link a {
            color: #00bcd4;
            text-decoration: none;
            margin-left: 5px;
        }

        .btn-submit {
            width: 100%;
            background-color: #00bcd4;
            color: #000000;
            border: none;
            border-radius: 25px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #0097a7;
        }

        .terms-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 35px;
            font-size: 14px;
            color: #ffffff;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00bcd4;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            color: #000000;
            font-size: 11px;
            font-weight: bold;
        }

        .terms-container a {
            color: #00bcd4;
            text-decoration: none;
            margin: 0 4px;
        }

        .flash-messages {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        .flash-error {
            background-color: #721c24;
            color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .flash-success {
            background-color: #155724;
            color: #d4edda;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">Account Login</div>

        <div class="logo-container">
            <div class="logo-circle">
                <div class="logo-icon">L</div>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-messages flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" placeholder="Please enter your phone" required>
            </div>

            <div class="form-group">
                <label for="password">Login password</label>
                <input type="password" id="password" name="password" placeholder="Please enter your login password" required>
            </div>

            <div class="switch-link">
                Don't have an account?<a href="{{ url_for('register') }}">Register Now</a>
            </div>

            <button type="submit" class="btn-submit">Login now</button>
            
            <div class="terms-container">
                <div class="custom-checkbox">✓</div>
                <span>Agree with us <a href="#">terms of use</a> and <a href="#">Privacy Policy</a></span>
            </div>
        </form>
    </div>

</body>
</html>
