<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Plan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

.header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:25px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:40px 20px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.title{
    font-size:24px;
    font-weight:bold;
    color:#333;
    margin-bottom:10px;
}

.text{
    color:#777;
    font-size:16px;
}
</style>

</head>
<body>

<div class="header">
    My Plan
</div>

<div class="container">

    <div class="card">
        <div class="icon">📦</div>

        <div class="title">
            No Investment Yet
        </div>

        <div class="text">
            You have not purchased any investment plan.
        </div>

    </div>

</div>

</body>
</html>
