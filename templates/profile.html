<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Dashboard</title>
    <style>
        /* Base Dark Theme Configuration */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #020710;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }

        .profile-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        /* Balance & Account Number Cards */
        .info-card {
            background-color: #050f1e;
            border: 1px solid #0d1e36;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .card-label {
            color: #00bcd4;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            font-family: sans-serif;
        }

        .balance-amount {
            color: #ffb703;
            font-size: 32px;
            margin-top: 4px;
        }

        /* Transaction Action Grid Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .grid-btn {
            background-color: #050f1e;
            border: 1px solid #0d1e36;
            color: #ffffff;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, background-color 0.2s;
        }

        .grid-btn:active {
            transform: scale(0.97);
        }

        /* Button Colors and Layout Modifiers */
        .btn-withdraw {
            border-left: 4px solid #e63946;
        }
        .btn-withdraw:hover { background-color: #141624; }

        .btn-deposit {
            border-left: 4px solid #2a9d8f;
        }
        .btn-deposit:hover { background-color: #0a1f24; }

        .btn-plan {
            grid-column: span 2;
            background-color: #118ab2;
            border: none;
            padding: 15px;
            font-size: 15px;
        }
        .btn-plan:hover { background-color: #0077b6; }

        /* Core Execution Navigation Finish Button */
        .btn-done {
            width: 100%;
            background-color: #00bcd4;
            color: #020710;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-done:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="profile-container">

        <!-- User Account Card -->
        <div class="info-card">
            <div class="card-label">User Account Number</div>
            <div class="card-value" id="accountNoDisplay">Loading...</div>
        </div>

        <!-- Wallet Fund Balance Card -->
        <div class="info-card">
            <div class="card-label">Current Available Balance</div>
            <div class="card-value balance-amount" id="balanceDisplay">$0.00</div>
        </div>

        <!-- Finance Utilities Dashboard Panel Operations Grid -->
        <div class="action-grid">
            <button class="grid-btn btn-withdraw" onclick="navigateTo('/withdraw')">
                <span>💸</span> Withdraw
            </button>

            <button class="grid-btn btn-deposit" onclick="navigateTo('/deposit')">
                <span>💳</span> Deposit
            </button>

            <button class="grid-btn btn-plan" onclick="navigateTo('/plan')">
                <span>📦</span> View Packages & Plans
            </button>
        </div>

        <button class="btn-done" onclick="navigateTo('/dashboard')">
            Done
        </button>

    </div>

    <!-- UI Core Logic Controller Integration -->
    <script>
        function navigateTo(routePath) {
            window.location.href = routePath;
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user/account-details')
                .then(response => {
                    if (!response.ok) throw new Error("Connection drop");
                    return response.json();
                })
                .then(data => {
                    if (!data.error) {
                        // MAP PHONE NUMBER TO ACCOUNT NUMBER DISPLAY
                        // Uses phone_number from API. Falls back to original property if missing.
                        document.getElementById('accountNoDisplay').innerText = data.phone_number || data.account_number;
                        
                        // DISPLAY ACTUAL ACCOUNT BALANCE AMOUNT
                        // Uses actual_balance or balance from API.
                        let actualBalance = data.actual_balance !== undefined ? data.actual_balance : data.balance;
                        document.getElementById('balanceDisplay').innerText = "$" + actualBalance.toFixed(2);
                    } else {
                        fallbackUI();
                    }
                })
                .catch(error => {
                    console.error("Profile payload issue:", error);
                    fallbackUI();
                });
        });

        function fallbackUI() {
            document.getElementById('accountNoDisplay').innerText = "Unavailable";
            document.getElementById('balanceDisplay').innerText = "GHC 0.00";
        }
    </script>
</body>
</html>
