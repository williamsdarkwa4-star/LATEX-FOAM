<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #020710; color: #ffffff; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; width: 100%; }
        
        .card-panel { background-color: #050f1e; border: 1px solid #0d1e36; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .label { color: #00bcd4; font-size: 11px; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; }
        .value { font-size: 20px; font-weight: bold; margin-bottom: 16px; color: #ffffff; }
        .money { color: #ffb703; font-size: 26px; }
        
        .input-box { display: flex; flex-direction: column; margin-bottom: 18px; }
        input { background-color: #020710; border: 1px solid #0d1e36; padding: 12px; border-radius: 8px; color: white; font-size: 14px; margin-top: 6px; }
        input:focus { border-color: #00bcd4; outline: none; }
        
        .action-btn { width: 100%; background-color: #118ab2; color: white; border: none; padding: 13px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .action-btn.secondary { background-color: #00bcd4; color: #020710; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Balance and Wallet Information Grid -->
        <div class="card-panel">
            <div class="label">User Account Number</div>
            <div class="value" id="accNumber">Loading...</div>
            
            <div class="label">Current Available Balance</div>
            <div class="value money" id="accBalance">$0.00</div>
        </div>

        <!-- Changing Login Code -->
        <div class="card-panel">
            <div class="label" style="color:#118ab2;">Account Security</div>
            <h4 style="margin: 5px 0 15px 0;">Change Login Password</h4>
            <div class="input-box">
                <input type="password" id="loginPassInput" placeholder="Enter new login password">
            </div>
            <button class="action-btn" onclick="submitSecurityUpdate('login', 'loginPassInput')">Update Login Password</button>
        </div>

        <!-- Changing Transaction Security Code -->
        <div class="card-panel">
            <div class="label" style="color:#00bcd4;">Funds Protection</div>
            <h4 style="margin: 5px 0 15px 0;">Change Withdrawal Password</h4>
            <div class="input-box">
                <input type="password" id="withdrawPassInput" placeholder="Enter new withdrawal password">
            </div>
            <button class="action-btn secondary" onclick="submitSecurityUpdate('withdrawal', 'withdrawPassInput')">Update Withdrawal Password</button>
        </div>
    </div>

    <script>
        // Load initial balance stats automatically
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user/account-overview')
                .then(res => res.json())
                .then(data => {
                    if(!data.error) {
                        document.getElementById('accNumber').innerText = data.account_number;
                        document.getElementById('accBalance').innerText = "$" + data.balance.toFixed(2);
                    }
                });
        });

        // Modular handling for payload submissions
        function submitSecurityUpdate(targetType, inputElementId) {
            const inputField = document.getElementById(inputElementId);
            const passwordValue = inputField.value.trim();
            
            if(passwordValue.length < 6) {
                alert("The password field requires at least 6 characters.");
                return;
            }

            fetch('/api/user/update-security', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: targetType, value: passwordValue })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert(data.success);
                    inputField.value = ""; // Flush memory state safely
                } else {
                    alert(data.error || "Update operation encountered an issue.");
                }
            })
            .catch(err => alert("Communication error with server infrastructure."));
        }
    </script>
</body>
</html>
