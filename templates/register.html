<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - LATEX FOAM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 10px;
        }

        .header {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #888888;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            background-color: #111111;
            border: 1px solid #222222;
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: #00bfff;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.1);
        }

        /* Grayed out styling state for auto-filled invite inputs */
        .form-group input:read-only {
            background-color: #090909;
            border-color: #1a1a1a;
            color: #00bfff;
            cursor: not-allowed;
            font-weight: 600;
        }

        .flash-messages {
            margin-bottom: 20px;
            list-style: none;
        }

        .flash-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        .flash-message.error {
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
        }

        .flash-message.success {
            background-color: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.2);
            color: #4dff4d;
        }

        .submit-btn {
            width: 100%;
            background-color: #00bfff;
            color: #000000;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s ease;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #888888;
        }

        .footer-link a {
            color: #00bfff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">LATEX FOAM REGISTRATION</div>

        <!-- System Response Alert Loop Banner -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-messages">
              {% for category, message in messages %}
                <li class="flash-message {{ category }}">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <!-- Security Form Structure Processing Layer -->
        <form action="{{ url_for('register') }}" method="POST">
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter phone number" required>
            </div>

            <div class="form-group">
                <label>Login Password</label>
                <input type="password" name="password" placeholder="Enter security login password" required>
            </div>

            <div class="form-group">
                <label>Withdrawal Password</label>
                <input type="password" name="withdraw_password" placeholder="Set 6-digit withdrawal PIN" required>
            </div>

            <!-- Enhanced Invitation Code Input Field Setup -->
            <div class="form-group">
                <label>Invitation Code</label>
                <input type="text" 
                       name="invite_code" 
                       placeholder="Enter referral invite code" 
                       value="{{ url_invite_code }}"
                       {% if url_invite_code %} readonly {% endif %}>
            </div>

            <button type="submit" class="submit-btn">CREATE PLATFORM ACCOUNT</button>
        </form>

        <div class="footer-link">
            Already have an active portfolio? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>

</body>
</html>
