<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service - LATEX FOAM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 30px;
        }

        .top-navbar {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: #020708;
            border-bottom: 1px solid #0c2024;
        }

        .back-btn {
            text-decoration: none;
            color: #00bcd4;
            font-size: 20px;
            margin-right: 15px;
            font-weight: bold;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }

        /* Support Sphere Graphic Display */
        .support-icon-container {
            margin: 20px auto 40px auto;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, #0e3a3e 0%, #05181a 70%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 188, 212, 0.2);
        }

        .support-graphic {
            font-size: 55px;
            color: #00bcd4;
        }

        .welcome-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .description-text {
            font-size: 14px;
            color: #8da4a7;
            line-height: 1.6;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        /* Action Direct Link Button Styling */
        .btn-whatsapp {
            display: block;
            width: 100%;
            background-color: #00bcd4;
            color: #000000;
            text-decoration: none;
            border-radius: 25px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
            transition: all 0.3s ease;
        }

        .btn-telegram:hover {
            background-color: #0097a7;
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #4b5e61;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <a href="{{ url_for('dashboard') }}" class="back-btn">‹</a>
        <div class="page-title">Customer Service</div>
    </div>

    <div class="container">
        <div class="support-icon-container">
            <div class="support-graphic">🎧</div>
        </div>

        <h3 class="welcome-title">Online Support Channel</h3>
        <p class="description-text">
            Have any questions or need assistance with your deposit, withdrawal, or account parameters? Tap below to join our official customer care room.
        </p>

        <!-- Direct integration of your specific WhatsApp group route link -->
        <a href="https://t.me/+q7a7QREPK2Q4OGFk">
            Contact Customer Service
        </a>

        <div class="footer-note"> Available 24/7 for LATEX FOAM Investors </div>
    </div>

</body>
</html>
