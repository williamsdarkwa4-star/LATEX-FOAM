<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dashboard - LA</title>
    <style>
        /* Reset and Base Theme Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #020710;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 70px; /* Space for bottom nav */
        }

        /* Top Header Navigation */
        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #020710;
            padding: 15px 20px;
            border-bottom: 1px solid #0d192b;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .star-badge {
            position: absolute;
            top: -8px;
            left: -6px;
            color: #ffd700;
            font-size: 14px;
            filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.8));
            z-index: 10;
        }

        .blue-sphere {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #00d2ff, #0052cc, #001133);
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.8), 0 0 12px rgba(0, 114, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .l-shape {
            font-size: 13px;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 6px rgba(0, 210, 255, 0.9);
        }

        .title-text {
            display: flex;
            flex-direction: column;
        }

        .main-title {
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            line-height: 1.2;
        }

        .sub-title {
            color: #4ba3e3;
            font-size: 11px;
            margin-top: 2px;
        }

        .close-btn {
            background: none;
            border: 1px solid #142847;
            color: #a0aec0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background-color: #0b1a30;
        }

        /* Dashboard Content Container */
        .dashboard-container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Invitation Link Module Card */
        .card-panel {
            background-color: #050f1e;
            border: 1px solid #0d1e36;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .panel-label {
            color: #0088cc;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .link-display-box {
            background-color: #020710;
            border: 2px solid #ffffff;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            color: #00bcd4;
            font-family: monospace;
            font-size: 15px;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .action-btn {
            width: 100%;
            background-color: #118ab2;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s, background-color 0.2s;
        }

        .action-btn:hover {
            background-color: #0077b6;
        }

        /* Counter Metric Panel */
        .counter-label {
            color: #ffffff;
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .counter-sub {
            color: #4a5d78;
            font-size: 11px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        /* Level Grid Structure */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .level-box {
            background-color: #050f1e;
            border: 1px solid #0d1e36;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .level-box.active {
            border: 2px solid #00bcd4;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.2);
        }

        .lvl-title {
            color: #4a5d78;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .lvl-pct-1, .lvl-pct-2, .lvl-pct-3 { 
            color: #ffb703; 
            font-size: 16px; 
            font-weight: bold; 
        }

        .lvl-count {
            color: #4a5d78;
            font-size: 11px;
            margin-top: 4px;
        }

        /* Status Information Text Area */
        .status-message {
            text-align: center;
            color: #a0aec0;
            font-size: 14px;
            padding: 15px;
            margin-top: 10px;
        }

        /* Bottom Tab Interface Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #030a16;
            border-top: 1px solid #0d192b;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a5d78;
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item.active {
            color: #4ba3e3;
        }

        .nav-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Header -->
    <div class="header-nav">
        <div class="logo-group">
            <!-- 1. Golden Star -->
            <div class="star-badge">★</div>
            <!-- 2. Blue Sphere Orb -->
            <div class="blue-sphere">
                <!-- 3. Small Blue L inside -->
                <div class="l-shape">L</div>
            </div>
            <div class="title-text">
                <span class="main-title">Loading...</span>
                <span class="sub-title">Team Network Hub</span>
            </div>
        </div>
        <button class="close-btn" onclick="window.history.back()">✕ Close</button>
    </div>

    <!-- Main Content Panel Area -->
    <div class="dashboard-container">
        
        <!-- Invitation Link Block -->
        <div class="card-panel">
            <div class="panel-label">Your Invitation Link</div>
            <div class="link-display-box" id="linkBox">
                <!-- Flask inserts link here, falls back to message if missing -->
                {{ invite_link if invite_link else 'Loading link...' }}
            </div>
            <button class="action-btn" onclick="copyReferralLink()">Copy Link</button>
        </div>

        <!-- Recruitment Statistics Module -->
        <div class="card-panel">
            <div class="counter-label" id="totalMembers">0</div>
            <div class="counter-sub">Total Members Recruited</div>
        </div>

        <!-- Multilevel Commission Tiers Grid -->
        <div class="level-grid">
            <!-- Level 1 (Highlighted/Active Tier) -->
            <div class="level-box active">
                <div class="lvl-title">Level 1</div>
                <div class="lvl-pct-1">30%</div>
                <div class="lvl-count"><span id="lvl1Count">0</span> Members</div>
            </div>
            
            <!-- Level 2 -->
            <div class="level-box">
                <div class="lvl-title">Level 2</div>
                <div class="lvl-pct-2">2%</div>
                <div class="lvl-count"><span id="lvl2Count">0</span> Members</div>
            </div>
            
            <!-- Level 3 -->
            <div class="level-box">
                <div class="lvl-title">Level 3</div>
                <div class="lvl-pct-3">1%</div>
                <div class="lvl-count"><span id="lvl3Count">0</span> Members</div>
            </div>
        </div>

        <!-- Real-Time Error/Status Notices -->
        <div class="status-message" id="statusMessage">
            Unable to load team data
        </div>

    </div>

    <!-- Footer Mobile Navigation Bar System -->
    <div class="bottom-nav">
        <a href="/dashboard" class="nav-item">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="/team" class="nav-item active">
            <div class="nav-icon">👥</div>
            <div>Team</div>
        </a>
        <a href="/plan" class="nav-item">
            <div class="nav-icon">📦</div>
            <div>Plan</div>
        </a>
        <a href="/profile" class="nav-item">
            <div class="nav-icon">👤</div>
