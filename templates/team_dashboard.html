<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Dashboard - LATEX FOAM</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:#000407;
    color:white;
    min-height:100vh;
    padding-bottom:90px;
}

/* Header */
.top-nav{
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#000810;
    border-bottom:1px solid #111827;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    color:#22d3ee;
    font-size:28px;
    font-weight:900;
    font-style:italic;
}

.phone{
    font-size:14px;
    font-weight:700;
}

.subtitle{
    color:#22d3ee;
    font-size:10px;
}

.close-btn{
    text-decoration:none;
    color:#9ca3af;
    background:#111827;
    padding:7px 12px;
    border-radius:8px;
}


/* Cards */

.card{
    margin:16px;
    padding:16px;
    background:#000c18;
    border:1px solid #083344;
    border-radius:12px;
}


.label{
    color:#06b6d4;
    font-size:11px;
    font-weight:bold;
    margin-bottom:8px;
}


.link-box{
    background:#000;
    border:1px solid #1f2937;
    padding:12px;
    border-radius:8px;
}


input{
    width:100%;
    background:#000;
    color:#22d3ee;
    border:1px solid #1f2937;
    padding:10px;
    border-radius:6px;
    text-align:center;
    font-family:monospace;
}


button{
    width:100%;
    margin-top:10px;
    padding:11px;
    background:#0891b2;
    color:white;
    border:0;
    border-radius:7px;
    font-weight:bold;
}


/* Total */

.total{
    margin:16px;
    padding:25px;
    text-align:center;
    background:#000c18;
    border:1px solid #083344;
    border-radius:12px;
}

.total-number{
    color:#06b6d4;
    font-size:30px;
    font-weight:900;
}

.total-text{
    color:#6b7280;
    font-size:11px;
}


/* Levels */

.levels{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:16px;
}


.level{
    background:#000c18;
    border:1px solid #111827;
    padding:12px;
    border-radius:12px;
    text-align:center;
}


.level.active{
    border:2px solid #06b6d4;
}


.level-title{
    font-size:10px;
    color:#6b7280;
}


.rate{
    font-size:18px;
    color:#fbbf24;
    font-weight:bold;
}


.count{
    font-size:10px;
    color:#9ca3af;
}


.member-area{
    margin:16px;
    padding:20px;
    background:#00050a;
    border-radius:12px;
    border:1px solid #111827;
}


.member{
    background:#000c18;
    padding:15px;
    border-radius:10px;
    margin-bottom:8px;
    border:1px solid #111827;
}


.member-id{
    font-weight:bold;
}


.member-date{
    color:#6b7280;
    font-size:11px;
}


/* Bottom */

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:#000810;
    border-top:1px solid #111827;
    display:flex;
    justify-content:space-around;
    align-items:center;
}


.nav{
    color:#6b7280;
    text-decoration:none;
    font-size:11px;
    text-align:center;
}


.nav.active{
    color:#06b6d4;
}

</style>

</head>

<body>


<div class="top-nav">

<div class="brand">
<div class="logo">L</div>

<div>
<div id="phone" class="phone">
Loading...
</div>

<div class="subtitle">
Team Network Hub
</div>

</div>

</div>


<a href="/dashboard" class="close-btn">
✕ Close
</a>

</div>


<div class="card">

<div class="label">
YOUR INVITATION LINK
</div>

<div class="link-box">

<input id="refLink" readonly value="Loading link...">

<button onclick="copyLink()">
COPY LINK
</button>

</div>

</div>
<!-- Total Team -->
<div class="total">

    <div class="total-number" id="totalTeam">
        0
    </div>

    <div class="total-text">
        TOTAL MEMBERS RECRUITED
    </div>

</div>


<!-- Levels -->
<div class="levels">

    <div class="level active" id="level1" onclick="showLevel(1)">
        <div class="level-title">
            LEVEL 1
        </div>
        <div class="rate">
            30%
        </div>
        <div class="count" id="count1">
            0 Members
        </div>
    </div>


    <div class="level" id="level2" onclick="showLevel(2)">
        <div class="level-title">
            LEVEL 2
        </div>
        <div class="rate">
            2%
        </div>
        <div class="count" id="count2">
            0 Members
        </div>
    </div>


    <div class="level" id="level3" onclick="showLevel(3)">
        <div class="level-title">
            LEVEL 3
        </div>
        <div class="rate">
            1%
        </div>
        <div class="count" id="count3">
            0 Members
        </div>
    </div>

</div>



<!-- Members List -->

<div class="member-area" id="members">

    Loading members...

</div>



<!-- Bottom Navigation -->

<div class="bottom">

<a href="/dashboard" class="nav">
🏠<br>
Home
</a>


<a href="/team" class="nav active">
👥<br>
Team
</a>


<a href="/plan" class="nav">
📦<br>
Plan
</a>


<a href="/profile" class="nav">
👤<br>
Profile
</a>

</div>



<script>

let teamData = {};
let currentLevel = 1;



// Load team data from Flask

fetch("/api/team/dashboard-data")

.then(response => response.json())

.then(data => {


    teamData = data;


    document.getElementById("phone").innerHTML =
    data.username;


    document.getElementById("refLink").value =
    data.referral_link;


    document.getElementById("totalTeam").innerHTML =
    data.total_team;



    document.getElementById("count1").innerHTML =
    data.levels["1"].count + " Members";


    document.getElementById("count2").innerHTML =
    data.levels["2"].count + " Members";


    document.getElementById("count3").innerHTML =
    data.levels["3"].count + " Members";


    showLevel(1);


})

.catch(error=>{

    document.getElementById("members").innerHTML =
    "Unable to load team data";

});




// Change level

function showLevel(level){


    currentLevel = level;


    document.getElementById("level1").classList.remove("active");
    document.getElementById("level2").classList.remove("active");
    document.getElementById("level3").classList.remove("active");


    document.getElementById("level"+level)
    .classList.add("active");



    let box =
    document.getElementById("members");


    let list =
    teamData.levels[level].members;



    if(list.length === 0){

        box.innerHTML =
        "No members in this level yet";

        return;

    }



    let html="";


    list.forEach(member=>{


        html += `

        <div class="member">

            <div class="member-id">
            Member ID: ${member.id}
            </div>

            <div class="member-date">
            Joined: ${member.date}
            </div>

        </div>

        `;


    });


    box.innerHTML = html;


}




// Copy referral link

function copyLink(){

let input =
document.getElementById("refLink");


input.select();

input.setSelectionRange(0,99999);


navigator.clipboard.writeText(input.value);


alert("Invitation link copied!");

}


</script>


</body>
</html>
