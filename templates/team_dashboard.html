<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dashboard - LATEX FOAM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000407;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Top Header Navigation style */
        .top-nav {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #111827;
            background-color: #000810;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-l {
            color: #22d3ee;
            font-weight: 900;
            font-size: 24px;
            font-style: italic;
        }

        .user-phone {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            color: #e5e7eb;
        }

        .hub-title {
            font-size: 10px;
            color: #22d3ee;
            font-weight: 500;
        }

        .close-btn {
            font-size: 12px;
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 6px 12px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.2s;
        }

        /* Referral Link Top Styling Card Box */
        .card-box {
            margin: 16px;
            background-color: #000c18;
            border: 1px solid #083344;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .input-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            color: #06b6d4;
            margin-bottom: 8px;
        }

        .link-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #000408;
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #111827;
        }

        .link-input {
            background: transparent;
            border: none;
            color: #d1d5db;
            font-size: 12px;
            flex: 1;
            outline: none;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-button {
            background-color: #0891b2;
            color: #ffffff;
            font-weight: 700;
            font-size: 12px;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s;
        }

        /* Total Score Big Banner Block */
        .total-banner {
            margin: 0 16px 16px 16px;
            background: linear-gradient(to bottom, #001020, #00060c);
            border: 1px solid #083344;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .glow-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 1px solid rgba(6, 182, 212, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
        }

        .total-number {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #06b6d4;
        }

        .total-label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Level Selector Cards Navigation row Grid */
        .levels-grid {
            display: grid;
            grid-template-cols: repeat(3, 1fr);
            gap: 10px;
            margin: 0 16px 20px 16px;
        }

        .level-card {
            background-color: #000c18;
            border: 1px solid #111827;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .level-card.active {
            background-color: #001020;
            border: 2px solid #06b6d4;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
        }

        .level-title {
            font-size: 10px;
            color: #6b7280;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .level-card.active .level-title {
            color: #06b6d4;
        }

        .level-rate {
            font-size: 18px;
            font-weight: 900;
            color: #9ca3af;
        }

        .level-card.active .level-rate {
            color: #fbbf24;
        }

        .level-members-count {
            font-size: 9px;
            color: #4b5563;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Dynamic Member Items Output wrapper container box list */
        .roster-area {
            margin: 0 16px;
            text-align: center;
            font-size: 12px;
            color: #4b5563;
            font-weight: 500;
            padding: 40px 16px;
            background-color: #00050a;
            border-radius: 12px;
            border: 1px solid rgba(17, 24, 39, 0.6);
        }

        .member-row {
            background-color: #000c18;
            border: 1px solid #111827;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            text-align: left;
        }

        .member-id {
            font-size: 14px;
            font-weight: 700;
            color: #e5e7eb;
            letter-spacing: 0.5px;
        }

        .member-date {
            font-size: 10px;
            color: #4b5563;
            margin-top: 4px;
        }

        .member-badge {
            background-color: rgba(8, 145, 178, 0.1);
            color: #06b6d4;
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Fixed Footer Menu styles matching layout image shapes */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #000810;
            border-top: 1px solid #111827;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            color: #6b7280;
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            display: block;
        }

        .nav-item.active {
            color: #06b6d4;
            font-weight: 700;
        }

        .nav-icon {
            font-size: 18px;
            margin-bottom: 2px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="top-nav">
        <div class="brand-section">
            <span class="logo-l">L</span>
            <div>
                <div id="userPhoneDisplay" class="user-phone">Loading Account...</div>
                <div class="hub-title">Team Network Hub</div>
            </div>
        </div>
        <a href="/dashboard" class="close-btn">✕ Close</a>
    </div>

    <!-- Updated Referral Link Display Card Box Module -->
    <div class="card-box">
        <label class="input-label">Your Invitation Link</label>
        <div class="link-container">
            <input type="text" id="refLinkInput" onclick="this.select();" value="https://onrender.com..." class="link-input">
            <button onclick="copyReferralLink()" id="copyBtn" class="copy-button">Select Link</button>
        </div>
    </div>

    <!-- Total Count Banner -->
    <div class="total-banner">
        <div class="glow-circle">
            <span class="logo-l" style="font-size:20px;">L</span>
        </div>
        <div id="totalTeamText" class="total-number">0</div>
        <div class="total-label">Total Members Recruited</div>
    </div>

    <!-- Level Cards Grid Row -->
    <div class="levels-grid">
        <div onclick="switchLevel(1)" id="cardLvl1" class="level-card active">
            <span class="level-title">LEVEL 1</span>
            <div class="level-rate">30%</div>
            <div id="countLvl1" class="level-members-count">0 Members</div>
        </div>
        <div onclick="switchLevel(2)" id="cardLvl2" class="level-card">
            <span class="level-title">LEVEL 2</span>
            <div class="level-rate">2%</div>
            <div id="countLvl2" class="level-members-count">0 Members</div>
        </div>
        <div onclick="switchLevel(3)" id="cardLvl3" class="level-card">
            <span class="level-title">LEVEL 3</span>
            <div class="level-rate">1%</div>
            <div id="countLvl3" class="level-members-count">0 Members</div>
        </div>
    </div>
